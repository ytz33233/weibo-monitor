name: Daily Sentiment Collection

on:
  schedule:
    # 每天 UTC 01:00 和 10:00 运行（对应北京时间 09:00 和 18:00）
    - cron: '0 1,10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "collection"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Weibo MCP Server
        run: |
          mkdir -p mcp-servers/weibo
          cd mcp-servers/weibo
          git clone --depth 1 https://github.com/Selenium39/mcp-server-weibo.git .
          npm install
          npm run build
          echo "WEIBO_MCP_PATH=$(pwd)/dist/index.js" >> $GITHUB_ENV
      
      - name: Install XHS MCP Server
        run: |
          python -m venv mcp-servers/xhs-env
          source mcp-servers/xhs-env/bin/activate
          pip install xiaohongshu-mcp-server
          echo "XHS_ENV_PATH=$(pwd)/mcp-servers/xhs-env" >> $GITHUB_ENV
          echo "XHS_MCP_PORT=18060" >> $GITHUB_ENV
      
      - name: Run data collection
        id: collection
        timeout-minutes: 30
        run: |
          source $XHS_ENV_PATH/bin/activate
          xhs-mcp --transport http --port $XHS_MCP_PORT &
          XHS_PID=$!
          
          echo "Waiting for XHS MCP server to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:$XHS_MCP_PORT/mcp > /dev/null 2>&1; then
              echo "XHS MCP server is ready!"
              break
            fi
            sleep 2
          done
          
          export WEIBO_MCP_ARGS="$WEIBO_MCP_PATH"
          export XHS_MCP_URL="http://127.0.0.1:$XHS_MCP_PORT/mcp"
          
          python run_collection.py 2>&1 | tee collection.log
          COLLECTION_EXIT_CODE=$?
          
          kill $XHS_PID 2>/dev/null || true
          
          echo "=== Collection Summary ==="
          echo "Exit code: $COLLECTION_EXIT_CODE"
          ls -la data/*.json 2>/dev/null || echo "No JSON files found"
          
          exit $COLLECTION_EXIT_CODE
      
      - name: Commit data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/*.json 2>/dev/null || true
          git add data/sentiment_monitor.db 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          DATE_STR=$(date +'%Y-%m-%d')
          git commit -m "chore: daily sentiment collection for $DATE_STR [skip ci]"
          git push
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-logs-${{ github.run_id }}
          path: |
            collection.log
            data/
          retention-days: 7

  deploy:
    needs: collect
    if: always()
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
