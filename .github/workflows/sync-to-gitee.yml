name: Sync to Gitee

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add Gitee remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/weibo-monitor.git || \
          git remote set-url gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/weibo-monitor.git
      
      - name: Push to Gitee
        run: |
          git push gitee main --force
      
      - name: Trigger Gitee Pages Build
        if: secrets.GITEE_TOKEN != ''
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USERNAME }}/weibo-monitor/pages/builds" \
            -d '{"branch":"main","build_type":"build"}' || true
        continue-on-error: true
      
      - name: Sync status
        run: |
          echo "同步到 Gitee 完成"
          echo "Gitee 仓库: https://gitee.com/${{ secrets.GITEE_USERNAME }}/weibo-monitor"
